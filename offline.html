<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Không có kết nối</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .offline-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            margin: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .offline-icon {
            font-size: 80px;
            color: #ffc107;
            margin-bottom: 20px;
        }
        .retry-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 18px;
        }
        .retry-btn i {
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>
        <h2 class="text-danger">⚠️ Không có kết nối</h2>
        <p class="text-muted mt-3">
            Bạn đang ở chế độ offline. Vui lòng kiểm tra lại kết nối internet.
        </p>
        <p class="small text-muted">
            <i class="fas fa-info-circle"></i> Dữ liệu đã lưu sẽ được đồng bộ khi có mạng.
        </p>
        <button class="btn btn-primary retry-btn" onclick="window.location.reload()">
            <i class="fas fa-sync-alt"></i> Thử lại
        </button>
        <button class="btn btn-outline-secondary mt-2" onclick="window.location.href='/'">
            <i class="fas fa-home"></i> Về trang chủ
        </button>
    </div>
    
    <script>
        // Tự động reload khi có mạng
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
